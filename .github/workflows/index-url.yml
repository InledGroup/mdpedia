name: Index URL from Issue

on:
  issues:
    types: [opened]

jobs:
  index:
    if: startsWith(github.event.issue.title, 'http')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run indexer
        id: indexer
        run: |
          URL="${{ github.event.issue.title }}"
          node scripts/index-url.js "$URL"
          node scripts/generate-index.js

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Index: ${{ github.event.issue.title }}"
          file_pattern: "src/docs/** public/raw/** src/data/search-index.json"

      - name: Comment and close issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const user = context.payload.issue.user.login;
            const url = context.payload.issue.title;
            const isWildcard = url.endsWith('*');
            
            let body = `¡Hola @${user}! Indexación completada con éxito. 🚀\n\n`;
            
            if (isWildcard) {
                const baseUrl = url.slice(0, -1);
                const urlObj = new URL(baseUrl);
                const domain = urlObj.hostname;
                const pathname = urlObj.pathname === '/' ? '' : urlObj.pathname;
                const indexPath = `doc/${domain}${pathname}/_index`;
                
                body += `Has solicitado una indexación masiva del directorio **${baseUrl}**.\n\n` +
                        `- 📚 **Índice del Dominio**: [${indexPath}](https://inledgroup.github.io/mdpedia/${indexPath})\n` +
                        `- 🔍 Puedes buscar términos específicos de este dominio en el buscador principal.\n\n`;
            } else {
                const urlObj = new URL(url);
                const domain = urlObj.hostname;
                const pathname = urlObj.pathname === '/' ? '/index' : urlObj.pathname;
                const publicPath = `raw/${domain}${pathname}.md`;
                const docPath = `doc/${domain}${pathname}`;
                
                body += `- 📖 **Vista Humana**: [${docPath}](https://inledgroup.github.io/mdpedia/${docPath})\n` +
                        `- 🤖 **Raw para Agentes**: https://inledgroup.github.io/mdpedia/${publicPath}\n\n`;
            }
            
            body += `*Nota: Puede tardar un par de minutos en estar disponible mientras se despliega la nueva versión.*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: body
            });
            
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              state: 'closed'
            });
